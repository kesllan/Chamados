<script>
  // ==========================================
  // ESTADO GLOBAL DO SISTEMA
  // ==========================================
  var todosOsChamados = []; // Cache completo para busca/filtro rápido
  var listaChamados = [];   // Chamados exibidos na página atual
  var chamadoAtual = null;
  var appUserInfo = { isAdmin: false, setores: [] }; 
  var paginaAtual = 1;
  var itensPorPagina = 9; 
  var totalPaginas = 1;
  var filtroAtual = 'abertos';
  var anoFiltro = new Date().getFullYear().toString();

  // ==========================================
  // INICIALIZAÇÃO
  // ==========================================
  document.addEventListener('DOMContentLoaded', function() {
    console.log("Inicializando Aplicação...");
    
    // Inicializa seletor de ano
    popularSeletorAno();
    
    if (typeof google.script.run.getDadosDashboard !== 'function') {
      console.error("ERRO CRÍTICO: getDadosDashboard não foi detectada como função!");
      showMsg("Erro de Sistema", "As funções do servidor não foram carregadas corretamente.", "error");
    } else {
      // Carrega informações do usuário primeiro
      loadUserInfo();
      // Carrega todos os dados uma única vez para performance
      inicializarDados();
    }
  });

  function popularSeletorAno() {
    var select = document.getElementById('select-ano');
    if (!select) return;
    
    var anoAtual = new Date().getFullYear();
    var html = '';
    // Oferece o ano atual e os 2 anteriores
    for (var i = 0; i < 3; i++) {
      var ano = (anoAtual - i).toString();
      html += '<option value="' + ano + '"' + (ano === anoFiltro ? ' selected' : '') + '>' + ano + '</option>';
    }
    select.innerHTML = html;
  }

  function mudarAno(ano) {
    anoFiltro = ano;
    console.log("Filtrando por ano:", anoFiltro);
    renderDashboardLocal();
  }

  function inicializarDados() {
    document.getElementById('loading-spinner').style.display = 'flex';
    document.getElementById('chamados-container').style.display = 'none';
    
    // Carrega lista de técnicos para uso no sistema (ex: auxiliares)
    carregarTecnicos();
    
    // Buscamos TODOS os chamados (limite alto) sem filtro para cache local
    google.script.run
      .withSuccessHandler(function(resposta) {
        if (resposta.success) {
          todosOsChamados = resposta.chamados || [];
          loadDashboard(1, 'abertos');
        } else {
          showError(resposta.message);
        }
      })
      .withFailureHandler(showError)
      .getDadosDashboard(1, 5000, 'all'); 
  }

  function loadUserInfo() {
    google.script.run
      .withSuccessHandler(function(resp) {
        if(resp && resp.error) {
          showError(resp.error);
          return;
        }
        if(resp) {
          appUserInfo = resp;
          document.getElementById('user-email').textContent = resp.email || 'Analista';
          document.getElementById('user-role').textContent = resp.role || 'User';
          
          if (resp.isAdmin === true) {
            var zone = document.getElementById('admin-zone');
            if (zone) {
              zone.innerHTML = '<button id="btn-config" class="btn btn-sm btn-outline-light mr-3 d-flex align-items-center font-weight-bold" onclick="abrirConfiguracoes()" style="border-radius: 20px;">' +
                               '<i class="material-icons mr-1" style="font-size:18px">settings</i> Config' +
                               '</button>';
            }
          }
        }
        // Mostra o badge após carregar
        var badge = document.querySelector('.user-badge-wrapper');
        if(badge) badge.classList.remove('d-none');
      })
      .withFailureHandler(function(err) {
        console.error("Erro ao carregar info do usuário:", err);
        showError("Erro ao carregar informações do usuário: " + (err.message || err));
      })
      .getAppUserInfo();
  }

  // ==========================================
  // NÚCLEO DE DADOS (DASHBOARD) - OTIMIZADO CLIENT-SIDE
  // ==========================================

  function loadDashboard(pagina, filtro) {
    if (!pagina) pagina = 1;
    paginaAtual = pagina;
    if (filtro) filtroAtual = filtro;

    // Se não tivermos dados no cache, buscamos do servidor (fallback de segurança)
    if (!todosOsChamados || todosOsChamados.length === 0) {
      console.log("Cache vazio, buscando do servidor...");
      document.getElementById('loading-spinner').style.display = 'flex';
      google.script.run
        .withSuccessHandler(function(resposta) {
          todosOsChamados = resposta.chamados || [];
          renderDashboardLocal();
        })
        .withFailureHandler(showError)
        .getDadosDashboard(1, 5000, 'all');
      return;
    }

    renderDashboardLocal();
  }

  /**
   * Helper para verificar se um ticket é visível para o usuário logado.
   * Admin: vê setores vinculados (ou tudo se setor for 'Todos').
   * Técnico: vê seus chamados OU chamados do seu setor.
   */
  function isTicketVisible(t) {
    if (!appUserInfo) return false;
    var userEmail = String(appUserInfo.email || '').toLowerCase().trim();
    var userSectors = (appUserInfo.setores || []).map(function(s) { 
      return String(s).toUpperCase().replace('SETOR', '').trim(); 
    });
    var isAdmin = appUserInfo.isAdmin;
    
    // Normaliza o setor do ticket (Remove "Setor" se houver e limpa espaços)
    var ticketSector = String(t.setor || '').toUpperCase().replace('SETOR', '').trim();
    var ticketTech = String(t.tecnico || '').toLowerCase().trim();

    // Se o usuário tem acesso a "Todos" os setores, vê tudo
    if (userSectors.indexOf('TODOS') > -1) return true;

    // Lógica Admin: Vê TODOS os chamados dos setores vinculados a ele
    if (isAdmin) {
      return userSectors.indexOf(ticketSector) > -1;
    }

    // Lógica Técnico: Vê seus chamados OU chamados do seu setor
    var isMyTicket = (ticketTech === userEmail);
    var isMySectorTicket = (userSectors.indexOf(ticketSector) > -1);
    
    return isMyTicket || isMySectorTicket;
  }

  function atualizarContadoresStatus() {
    if (!todosOsChamados || todosOsChamados.length === 0) return;

    var counts = {
      'all': 0,
      'abertos': 0,
      'Novo': 0,
      'Agendado': 0,
      'Pendente': 0,
      'Concluido': 0,
      'Cancelado': 0,
      'Atrasado': 0
    };

    var statusAbertos = ['Novo', 'Agendado', 'Pendente', 'Atrasado'];

    todosOsChamados.forEach(function(t) {
      if (!isTicketVisible(t)) return;
      counts['all']++;
      var status = String(t.status || '').trim();
      var isFinalizado = (status === 'Concluído' || status === 'Cancelado');
      var slaEstourado = (t.slaEstourado === true || String(t.slaEstourado).toUpperCase() === 'TRUE');
      if (!isFinalizado && (status === 'Atrasado' || slaEstourado)) counts['Atrasado']++;
      if (status === 'Novo') counts['Novo']++;
      else if (status === 'Agendado') counts['Agendado']++;
      else if (status === 'Pendente') counts['Pendente']++;
      else if (status === 'Concluído') counts['Concluido']++;
      else if (status === 'Cancelado') counts['Cancelado']++;
      if (statusAbertos.indexOf(status) > -1) counts['abertos']++;
    });

    Object.keys(counts).forEach(function(key) {
      var el = document.getElementById('count-' + key);
      if (el) el.textContent = counts[key];
    });
  }

  function renderDashboardLocal() {
    document.getElementById('loading-spinner').style.display = 'none';
    var container = document.getElementById('chamados-container');
    container.innerHTML = '';
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('paginacao-container').innerHTML = '';

    // ATUALIZA CONTADORES DE STATUS
    atualizarContadoresStatus();

    // 1. FILTRAGEM LOCAL
    var filtrados = todosOsChamados.filter(function(t) {
      // REGRA DE OURO: Só processa se for visível para o usuário (Setor/Técnico)
      if (!isTicketVisible(t)) return false;
      var ticketStatus = String(t.status || '').trim();
      var isFinalizado = (ticketStatus === 'Concluído' || ticketStatus === 'Cancelado');
      var isAberto = !isFinalizado;
      var slaEstourado = (t.slaEstourado === true || String(t.slaEstourado).toUpperCase() === 'TRUE');
      var isAtrasado = isAberto && (ticketStatus === 'Atrasado' || slaEstourado);
      var isDoAnoSelecionado = (String(t.ano) === String(anoFiltro));
      if (isFinalizado && !isDoAnoSelecionado) return false;
      if (filtroAtual === 'all') return true;// Definição 1: Chamados Abertos (Tudo exceto finalizados)
      if (filtroAtual === 'abertos') return isAberto;
      
      // Definição 2: Atrasados (Status Atrasado OU SLA estourado, desde que aberto)
      if (filtroAtual === 'Atrasado') return isAtrasado;
      return ticketStatus === filtroAtual;
    });

    // 2. ORDENAÇÃO
    filtrados.sort(function(a, b) {
      // Valores numéricos para comparação precisa
      var timeA = a.timestamp || 0;
      var timeB = b.timestamp || 0;
      var schedA = a.scheduledTimestamp || 0;
      var schedB = b.scheduledTimestamp || 0;
      // FILTROS DE OPERAÇÃO (Fila de Trabalho): Devem priorizar o que está esperando há mais tempo
      var filtrosDeFila = ['abertos', 'Atrasado', 'Pendente', 'Novo', 'Agendado'];
      if (filtrosDeFila.indexOf(filtroAtual) > -1) {
        var statusA = String(a.status || '').trim();
        var statusB = String(b.status || '').trim();
        // Camada 1: Pesos de Prioridade por Status Nominal (Agrupamento em Blocos)
        var pesos = { 'Atrasado': 10, 'Pendente': 20, 'Agendado': 30, 'Novo': 40 };
        var pesoA = pesos[statusA] || 999;
        var pesoB = pesos[statusB] || 999;
        // Se os grupos de status forem diferentes, o grupo de maior prioridade sobe
        if (pesoA !== pesoB) return pesoA - pesoB;

        // Camada 2: Ordenação interna de cada bloco
        if (statusA === 'Agendado') {
          // Para AGENDADOS: Data futura mais próxima primeiro (ASC)
          return schedA - schedB;
        } else {
          // Para os demais (Atrasado, Pendente, Novo): Mais antigos primeiro (ASC)
          return timeA - timeB;
        }
      }

      // FILTROS DE RESULTADO / HISTÓRICO (Concluído, Cancelado, Todos): Mais recentes primeiro (DESC)
      return timeB - timeA;
    });

    // 3. PAGINAÇÃO LOCAL
    var total = filtrados.length;
    totalPaginas = Math.ceil(total / itensPorPagina) || 1;
    if (paginaAtual > totalPaginas) paginaAtual = totalPaginas;
    if (paginaAtual < 1) paginaAtual = 1;
    var inicio = (paginaAtual - 1) * itensPorPagina;
    var paginados = filtrados.slice(inicio, inicio + itensPorPagina);
    listaChamados = paginados;

    // 4. RENDERIZAÇÃO
    if (paginados.length === 0) {
      document.getElementById('empty-state').style.display = 'block';
      document.querySelector('#empty-state p').textContent = "Nenhum chamado encontrado com o filtro atual.";
      return;
    }

    container.style.display = 'flex'; 
    paginados.forEach(function(c) {
      var status = c.status || 'Novo';
      var protocolo = c.protocolo || 'N/A';
      var escola = c.escolaNome || 'Escola não identificada';
      var municipio = c.municipio || 'Município N/D';
      var tecnico = c.tecnicoNome || 'Sem técnico';
      var tipo = c.tipo || 'Geral';
      var data = c.dataAbertura || '';
      var hasTermo = !!c.linkTermo;
      
      // Lógica de SLA e Ícone: Ignora SLA se finalizado
      var isFinalizado = (status === "Concluído" || status === "Cancelado");
      var slaReal = (!isFinalizado && (status === "Atrasado" || c.slaEstourado === true || String(c.slaEstourado).toUpperCase() === 'TRUE'));
      var icon = "help_outline";
      if (status === "Novo") icon = "fiber_new";
      else if (status === "Agendado") icon = "event";
      else if (status === "Pendente") icon = "hourglass_empty";
      else if (status === "Concluído") icon = "check_circle";
      else if (status === "Cancelado") icon = "cancel";
      if (slaReal) icon = "warning";
      var slaHtml = slaReal ? '<span class="badge-sla">SLA ESTOURADO</span>' : '';
      var termoHtml = hasTermo ? '<i class="material-icons text-danger ml-2" style="font-size:18px;" title="Termo de Visita Gerado">picture_as_pdf</i>' : '';
      var html = '<div class="col-12 col-md-6 col-lg-4 mb-4 item-chamado" data-status="' + status + '" data-protocolo="' + protocolo + '">' + 
          '<div class="card-chamado h-100 status-' + status + '" onclick="abrirDetalhes(\'' + protocolo + '\')">' + 
            '<div class="p-3">' + 
              '<div class="d-flex justify-content-between align-items-start mb-2">' + 
                '<div class="d-flex align-items-center"><span class="card-protocolo">#' + protocolo + '</span>' + termoHtml + '</div>' + 
                '<small class="text-muted font-weight-bold" style="font-size:12px;">' + data + '</small>' + 
              '</div>' + 
              '<div class="card-escola truncate">' + escola + '</div>' + 
              '<div class="card-municipio">' + 
                '<i class="material-icons mr-1" style="font-size:12px;">place</i>' + municipio + 
              '</div>' + 
              '<div class="card-tipo">' + tipo + '</div>' + 
              '<div class="card-footer-info">' + 
                '<div class="d-flex align-items-center">' + 
                  '<i class="material-icons mr-1" style="font-size:16px;">' + icon + '</i>' + 
                  '<span class="font-weight-bold text-uppercase" style="font-size:10px; letter-spacing:0.5px;">' + status + '</span>' + 
                '</div>' + 
                '<div class="d-flex align-items-center">' + 
                   '<span class="tecnico-badge">' + tecnico + '</span>' + 
                   slaHtml + 
                '</div>' + 
              '</div>' + 
            '</div>' + 
          '</div>' + 
        '</div>';
      container.insertAdjacentHTML('beforeend', html);
    });
    renderizarPaginacao();
  }

  function renderizarPaginacao() {
    var container = document.getElementById('paginacao-container');
    if (!container) return;
    if (totalPaginas <= 1) { container.innerHTML = ''; return; }
    var html = '<div class="btn-group shadow-sm border rounded-pill overflow-hidden bg-white" role="group">';
    var prevDisabled = (paginaAtual <= 1) ? 'disabled' : '';
    html += '<button type="button" class="btn btn-light ' + prevDisabled + '" onclick="mudarPagina(' + (paginaAtual - 1) + ')">' + 
            '<i class="material-icons align-middle" style="font-size:20px; color:#1e40af;">chevron_left</i></button>';
    html += '<button type="button" class="btn btn-white disabled font-weight-bold text-muted" style="min-width:120px; font-size:11px; letter-spacing:1px;">' + 
            'PÁGINA ' + paginaAtual + ' / ' + totalPaginas + '</button>';
    var nextDisabled = (paginaAtual >= totalPaginas) ? 'disabled' : '';
    html += '<button type="button" class="btn btn-light ' + nextDisabled + '" onclick="mudarPagina(' + (paginaAtual + 1) + ')">' + 
            '<i class="material-icons align-middle" style="font-size:20px; color:#1e40af;">chevron_right</i></button>';
    html += '</div>';
    container.innerHTML = html;
  }

  function mudarPagina(novaPagina) {
    if (novaPagina < 1 || novaPagina > totalPaginas) return;
    paginaAtual = novaPagina;
    renderDashboardLocal();
    window.scrollTo(0, 0);
  }

  function filtrarChamados(filtro, btn) {
    var chips = document.querySelectorAll('.filter-chip');
    for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
    if (btn) btn.classList.add('active');
    if (filtro !== filtroAtual) {
       filtroAtual = filtro;
       paginaAtual = 1;
       renderDashboardLocal();
    }
  }

  function abrirDetalhes(protocolo) {
    chamadoAtual = null;
    for (var i = 0; i < listaChamados.length; i++) {
      if (String(listaChamados[i].protocolo) === String(protocolo)) {
        chamadoAtual = listaChamados[i];
        break;
      }
    }
    if (!chamadoAtual) return;

    // Remove tab reset logic since tabs are gone
    
    document.getElementById('detalhe-protocolo').textContent = "Protocolo #" + chamadoAtual.protocolo;
    document.getElementById('detalhe-escola').textContent = chamadoAtual.escolaNome + " (" + chamadoAtual.inep + ")";
    document.getElementById('detalhe-tipo').textContent = chamadoAtual.tipo;
    document.getElementById('detalhe-data').textContent = (chamadoAtual.dataAbertura || '').split(' ')[0];
    document.getElementById('detalhe-tecnico').textContent = chamadoAtual.tecnicoNome || "Não Atribuído";
    
    // Novos Campos
    document.getElementById('detalhe-solicitante').textContent = chamadoAtual.solicitante || "Não Informado";
    document.getElementById('detalhe-cargo').textContent = chamadoAtual.cargo || "-";
    document.getElementById('detalhe-celular').textContent = chamadoAtual.celular || "-";
    document.getElementById('detalhe-obs').innerHTML = chamadoAtual.obs ? chamadoAtual.obs.replace(/\n/g, '<br>') : "<em>Nenhuma observação registrada.</em>";
    var dias = calcularDias(chamadoAtual.timestamp);
    var elDias = document.getElementById('detalhe-dias');
    if (chamadoAtual.status === 'Concluído' || chamadoAtual.status === 'Cancelado') {
       elDias.textContent = chamadoAtual.status.toUpperCase();
       elDias.className = "badge badge-dark p-2";
    } else {
       elDias.textContent = dias + " DIAS EM ABERTO";
       elDias.className = dias > 7 ? "badge badge-danger p-2" : "badge badge-success p-2";
    }
    document.getElementById('detalhe-texto').innerHTML = chamadoAtual.detalhe ? chamadoAtual.detalhe.replace(/\n/g, '<br>') : "Sem descrição.";
    renderizarAnexos(chamadoAtual.anexos);

    // 1. WhatsApp Escola (Diretor ou Fallback)
    var foneEscola = chamadoAtual.contatoDiretor ? chamadoAtual.contatoDiretor.toString().replace(/\D/g, '') : '';
    if (!foneEscola && chamadoAtual.celular) foneEscola = chamadoAtual.celular.toString().replace(/\D/g, '');
    var btnZap = document.getElementById('btn-whatsapp');
    if (foneEscola) { 
      btnZap.href = "https://wa.me/55" + foneEscola; 
      btnZap.classList.remove('disabled', 'opacity-25', 'text-muted'); 
      btnZap.classList.add('text-success');
    } else { 
      btnZap.href = "#"; 
      btnZap.classList.add('disabled', 'opacity-25', 'text-muted'); 
      btnZap.classList.remove('text-success');
    }

    // 2. Maps Escola
    var btnMaps = document.getElementById('btn-maps');
    if (chamadoAtual.latitude && chamadoAtual.longitude) {
       btnMaps.href = "https://www.google.com/maps/search/?api=1&query=" + chamadoAtual.latitude + "," + chamadoAtual.longitude;
    } else {
       btnMaps.href = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(chamadoAtual.escolaNome);
    }

    // 3. WhatsApp Solicitante (Exclusivo)
    var foneSolicitante = chamadoAtual.celular ? chamadoAtual.celular.toString().replace(/\D/g, '') : '';
    var btnZapSol = document.getElementById('btn-whatsapp-solicitante');
    if (foneSolicitante) {
      btnZapSol.href = "https://wa.me/55" + foneSolicitante;
      btnZapSol.classList.remove('d-none');
    } else {
      btnZapSol.classList.add('d-none');
    }
    configurarPainelStatus();
    $('#detalhesModal').modal('show');
  }

  function configurarPainelStatus() {
    var formStatus = document.getElementById('form-status');
    var btnEmitir = document.getElementById('btn-emitir-termo');
    var btnVerTermo = document.getElementById('btn-ver-termo');
    var avisoLock = document.getElementById('aviso-lock');
    formStatus.classList.remove('d-none');
    btnEmitir.classList.add('d-none');
    btnVerTermo.classList.add('d-none');
    avisoLock.classList.add('d-none');
    var btns = document.querySelectorAll('.btn-status');
    for(var k=0; k<btns.length; k++) {
      btns[k].classList.remove('active', 'btn-primary', 'btn-warning', 'btn-success', 'btn-danger');
      btns[k].disabled = false;
    }
    document.getElementById('input-status-selecionado').value = "";
    toggleCamposStatus(); 
    if (chamadoAtual.status === 'Concluído' || chamadoAtual.status === 'Cancelado') {
      formStatus.classList.add('d-none');
      avisoLock.classList.remove('d-none');
      var msg = chamadoAtual.status === 'Concluído' ? 'CHAMADO FINALIZADO' : 'CHAMADO CANCELADO';
      var btnEdit = chamadoAtual.status === 'Concluído' ? '<br><button class="btn btn-link btn-sm font-weight-bold mt-3" onclick="liberarEdicaoConcluido()">EDITAR DADOS DA CONCLUSÃO</button>' : '';
      avisoLock.innerHTML = '<i class="material-icons text-muted" style="font-size:48px;">lock</i><h5 class="text-muted font-weight-bold">' + chamadoAtual.status.toUpperCase() + '</h5>' + btnEdit;

      // Problema 5: Mostrar solução técnica na tela
      var solucaoHtml = chamadoAtual.solucao ? 
        '<div class="mt-4 p-3 bg-light border rounded text-left">' +
          '<label class="small font-weight-bold text-uppercase text-muted d-block mb-1">Solução Técnica Registrada:</label>' +
          '<div style="font-size:13px; color:#444; line-height:1.4;">' + chamadoAtual.solucao.replace(/\n/g, '<br>') + '</div>' +
        '</div>' : '';
      if (chamadoAtual.linkTermo) {
        btnVerTermo.classList.remove('d-none');
        btnVerTermo.innerHTML = 
          '<div class="d-flex flex-column">' +
            '<a href="' + chamadoAtual.linkTermo + '" target="_blank" class="btn btn-outline-danger btn-block font-weight-bold py-3 mb-2">' +
              '<i class="material-icons align-middle mr-2">picture_as_pdf</i> ACESSAR TERMO DE VISITA' +
            '</a>' +
            '<button class="btn btn-sm btn-link text-muted font-weight-bold" onclick="excluirTermo()">' +
              '<i class="material-icons align-middle" style="font-size:16px">delete_forever</i> EXCLUIR TERMO ATUAL' +
            '</button>' +
            solucaoHtml +
          '</div>';
      } else if (chamadoAtual.status === 'Concluído') {
        btnEmitir.classList.remove('d-none');
        btnVerTermo.classList.remove('d-none');
        btnVerTermo.innerHTML = solucaoHtml;
      }
    } else {
      var btnConcluir = document.getElementById('btn-status-concluido');
      if (chamadoAtual.status !== 'Agendado') {
        btnConcluir.disabled = true;
        btnConcluir.title = "Necessário agendar antes.";
      }
    }
  }

  function renderizarAnexos(anexosStr) {
    var galeria = document.getElementById('galeria-anexos');
    galeria.innerHTML = '';
    if (!anexosStr || anexosStr.trim() === "") {
      galeria.innerHTML = '<div class="col-12 text-center py-5 text-muted opacity-50 font-weight-bold">SEM ANEXOS NESTE CHAMADO</div>';
      return;
    }
    var urls = anexosStr.match(/https?:\/\/[^\s,]+/g) || [];
    for (var i = 0; i < urls.length; i++) {
      var url = urls[i];
      var idMatch = url.match(/id=([a-zA-Z0-9_-]+)/);
      var thumb = (idMatch && url.indexOf('drive.google.com') > -1) ? 'https://drive.google.com/thumbnail?id=' + idMatch[1] + '&sz=w400' : 'https://placehold.co/400?text=ARQUIVO';
      var html = '<div class="col-6 col-md-4 mb-3">' + 
          '<div class="position-relative border rounded shadow-sm overflow-hidden">' + 
            '<img src="' + thumb + '" class="img-anexo" onclick="window.open(\'' + url + '\', \'_blank\')">' + 
            '<div class="p-1 text-center bg-white border-top"><small class="font-weight-bold">Anexo ' + (i+1) + '</small></div>' + 
          '</div>' +

    }

  function selecionarStatus(btn) {
    var val = btn.getAttribute('data-value');
    var btns = document.querySelectorAll('.btn-status');
    for(var i=0; i<btns.length; i++) btns[i].classList.remove('active', 'btn-primary', 'btn-warning', 'btn-success', 'btn-danger');
    var classe = "btn-primary";
    if(val === "Pendente") classe = "btn-warning";
    if(val === "Concluído") classe = "btn-success";
    if(val === "Cancelado") classe = "btn-danger";
    btn.classList.add('active', classe);
    document.getElementById('input-status-selecionado').value = val;
    toggleCamposStatus(); 
  }

  function toggleCamposStatus() {
    var s = document.getElementById('input-status-selecionado').value;
    document.getElementById('campo-agendamento').classList.add('d-none');
    document.getElementById('campo-pendente').classList.add('d-none');
    document.getElementById('campo-cancelado').classList.add('d-none');
    document.getElementById('campo-conclusao').classList.add('d-none');
    if (s === 'Agendado') document.getElementById('campo-agendamento').classList.remove('d-none');
    else if (s === 'Pendente') document.getElementById('campo-pendente').classList.remove('d-none');
    else if (s === 'Cancelado') document.getElementById('campo-cancelado').classList.remove('d-none');
    else if (s === 'Concluído') document.getElementById('campo-conclusao').classList.remove('d-none');
  }

  function salvarStatus() {
    if (!chamadoAtual) return;
    var status = document.getElementById('input-status-selecionado').value;
    if (!status) { showMsg("Atenção", "Selecione um status.", "warning"); return; }
    var justificativa = "";
    var categorias = [];
    var causas = [];
    if (status === 'Pendente') justificativa = document.getElementById('input-justificativa-pendente').value;
    else if (status === 'Cancelado') justificativa = document.getElementById('input-justificativa-cancelado').value;
    else if (status === 'Agendado') justificativa = document.getElementById('input-agendar-obs').value;
    else if (status === 'Concluído') {
      // Coleta Checkboxes de Categorias
      document.querySelectorAll('.chk-conclusao-cat:checked').forEach(function(el) { categorias.push(el.value); });
      // Coleta Checkboxes de Causas
      document.querySelectorAll('.chk-conclusao-causa:checked').forEach(function(el) { causas.push(el.value); });
    }
    var payload = {
      protocolo: chamadoAtual.protocolo, 
      novoStatus: status,
      dataAgendamento: document.getElementById('input-data-agendamento').value,
      solucao: document.getElementById('input-solucao').value,
      categoria: categorias.join(" | "),
      causa: causas.join(" | "),
      tipoAtendimento: document.getElementById('input-tipo-atendimento').value,
      justificativa: justificativa
    };
    if (status === 'Agendado' && !payload.dataAgendamento) return showMsg("Erro", "Informe a data.", "error");
    if (status === 'Concluído') {
      if (!payload.solucao || categorias.length === 0 || causas.length === 0 || !payload.tipoAtendimento) {
        return showMsg("Erro", "Preencha solução, categorias, causas e tipo de atendimento.", "error");
      }
    }
    Swal.fire({ title: 'Salvando...', allowOutsideClick: false, didOpen: function() { Swal.showLoading() } });
    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp.success) { 
          if (status === 'Concluído') {
            // Se concluiu, não fecha o modal principal ainda, abre o de emissão de termo
            Swal.fire('Sucesso!', 'Chamado concluído! Agora preencha os dados do termo.', 'success').then(function() {
              refreshDados(); // Atualiza cache em background
              emitirTermoVisita(); // Abre o modal do termo
            });
          } else {
            Swal.fire('Sucesso!', resp.message, 'success'); 
            $('#detalhesModal').modal('hide'); 
            refreshDados(); 
          }
        }
        else showMsg("Erro", resp.message, "error");
      })
      .salvarAlteracaoStatus(payload);
  }

    todosOsChamados = []; // Limpa cache

  }

              '<select id="sw-ass-select" class="form-control mb-2" onchange="toggleAssinanteOutro(this.value)">' +
                (solicitante ? '<option value="' + solicitante + '">Solicitante: ' + solicitante + '</option>' : '') +
                '<option value="' + diretorCadastrado + '">Diretor(a): ' + diretorCadastrado + '</option>' +

              '</select>' +

      confirmButtonText: 'GERAR PDF',

      didOpen: function() {

            if(resp.success) { 
              Swal.fire({ icon: 'success', title: 'Sucesso!', text: 'Termo gerado!', confirmButtonText: 'ABRIR PDF' }).then(function() { 
                window.open(resp.urlPdf, '_blank'); 
                $('#detalhesModal').modal('hide');

  function excluirTermo() {
    if (!chamadoAtual || !chamadoAtual.protocolo) return;
    Swal.fire({
      title: 'Excluir Termo?',
      text: "O link do PDF será removido e você poderá gerar um novo. O arquivo no Drive também será excluído.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      cancelButtonColor: '#3085d6',
      confirmButtonText: 'SIM, EXCLUIR',
      cancelButtonText: 'CANCELAR'
    }).then(function(result) {
      if (result.isConfirmed) {
        Swal.fire({ title: 'Excluindo termo...', allowOutsideClick: false, didOpen: function() { Swal.showLoading() } });
        google.script.run
          .withSuccessHandler(function(resp) {
            if (resp.success) {
              // 1. Atualiza o objeto local para refletir que não tem mais termo
              chamadoAtual.linkTermo = "";
              
              // 2. Atualiza o cache global (todosOsChamados) para manter a consistência
              for (var i = 0; i < todosOsChamados.length; i++) {
                if (String(todosOsChamados[i].protocolo) === String(chamadoAtual.protocolo)) {
                  todosOsChamados[i].linkTermo = "";
                  break;
                }
              }

              // 3. Notifica o usuário e RE-RENDERIZA o painel de status (sem fechar o modal)
              Swal.fire('Excluído!', resp.message, 'success');
              configurarPainelStatus(); // Atualiza os botões na tela atual
            } else {
              showMsg("Erro", resp.message, "error");
            }
          })
          .withFailureHandler(showError)
          .removerTermoPdf(chamadoAtual.protocolo);
      }
    });
  }

  function popularFiltrosEscolas(escolas) {
    var selMun = document.getElementById('filtro-escola-municipio');
    var selSet = document.getElementById('filtro-escola-setor');
    
    // Pega valores únicos e ordena (ES5)
    var municipiosSet = {};
    var setoresSet = {};
    escolas.forEach(function(e) {
      if (e.Municipio) municipiosSet[e.Municipio] = true;
      if (e.Setor_Regiao) setoresSet[e.Setor_Regiao] = true;
    });
    var municipios = Object.keys(municipiosSet).sort();
    var setores = Object.keys(setoresSet).sort(function(a, b) { return a - b; });
    selMun.innerHTML = '<option value="">Todos os Municípios</option>';
    municipios.forEach(function(m) { selMun.insertAdjacentHTML('beforeend', '<option value="'+m+'">'+m+'</option>'); });
    selSet.innerHTML = '<option value="">Todos Setores</option>';
    setores.forEach(function(s) {
      var nomeTec = mapaTecnicosSetor[s] || mapaTecnicosSetor["Todos"] || "";
      var label = "Setor " + s + (nomeTec ? " (" + nomeTec + ")" : "");
      selSet.insertAdjacentHTML('beforeend', '<option value="'+s+'">'+label+'</option>');
    });
  }

  function renderizarTabelaEscolas(escolas) {
    var corpo = document.getElementById('corpo-tabela-escolas');
    corpo.innerHTML = '';
    
    // Ordenar: Primeiro Município, depois Nome da Escola (ES5)
    var escolasOrdenadas = escolas.slice().sort(function(a, b) {
      var munA = (a.Municipio || "").toLowerCase();
      var munB = (b.Municipio || "").toLowerCase();
      if (munA < munB) return -1;
      if (munA > munB) return 1;
      var nomeA = (a.Nome_Escola || a.Nome_Escola_Padrao || "").toLowerCase();
      var nomeB = (b.Nome_Escola || b.Nome_Escola_Padrao || "").toLowerCase();
      if (nomeA < nomeB) return -1;
      if (nomeA > nomeB) return 1;
      return 0;
    });
    escolasOrdenadas.forEach(function(esc) {
      // Mapeamento Flexível para diferentes versões de cabeçalhos
      var nome = esc.Nome_Escola || esc.Nome_Escola_Padrao || 'Sem Nome';
      var email = esc.Email_Diretor || esc.Email_Institucional || '-';
      var mun = esc.Municipio || '';
      var s = esc.Setor_Regiao || '-';
      var nomeTec = mapaTecnicosSetor[s] || mapaTecnicosSetor["Todos"] || "";
      var setorLabel = s + (nomeTec ? " <br><small class='text-primary font-weight-bold'>(" + nomeTec + ")</small>" : "");

      // Escaping for JS strings in onclick
      var nomeEscolaEscaped = nome.replace(/'/g, "\\'");
      var munEscaped = mun.replace(/'/g, "\\'");
      var botoesAcao = '';
      if (modoSelecaoEscola) {
        botoesAcao = '<button class="btn btn-sm btn-success font-weight-bold" onclick="selecionarEscolaParaChamado(\'' + esc.Cod_INEP + '\', \'' + nomeEscolaEscaped + '\', \'' + munEscaped + '\', \'' + s + '\')">SELECIONAR</button>';
      } else {
        var btnDel = appUserInfo.isAdmin ? '<button class="btn btn-sm btn-outline-danger" onclick="excluirEscola(\'' + esc.Cod_INEP + '\')"><i class="material-icons" style="font-size:16px">delete</i></button>' : '';
        botoesAcao = '<button class="btn btn-sm btn-outline-dark mr-1" title="Abrir Chamado" onclick="abrirNovoChamadoTecnico(\'' + esc.Cod_INEP + '\', \'' + nomeEscolaEscaped + '\', \'' + munEscaped + '\', \'' + s + '\')"><i class="material-icons" style="font-size:16px">add_task</i></button>' +
                     '<button class="btn btn-sm btn-outline-primary mr-1" onclick="editarEscola(\'' + esc.Cod_INEP + '\')"><i class="material-icons" style="font-size:16px">edit</i></button>' +
                     btnDel;
      }
      var html = '<tr>' +
        '<td class="p-3 font-weight-bold text-muted" style="font-size:13px">' + esc.Cod_INEP + '</td>' +
        '<td class="p-3 font-weight-bold" style="font-size:14px">' + nome + '</td>' +
        '<td class="p-3 font-weight-bold text-uppercase" style="font-size:13px">' + mun + '</td>' +
        '<td class="p-3 text-center" style="font-size:12px">' + setorLabel + '</td>' +
        '<td class="p-3" style="font-size:12px">' + email + '</td>' +
        '<td class="p-3 text-right">' + botoesAcao + '</td>' +
      '</tr>';
      corpo.insertAdjacentHTML('beforeend', html);
    });
  }

  function filtrarTabelaEscolas() {
    var termo = document.getElementById('busca-escola').value.toLowerCase();
    var mun = document.getElementById('filtro-escola-municipio').value;
    var set = document.getElementById('filtro-escola-setor').value;
    var filtradas = listaEscolasCompleta.filter(function(e) {
      var nome = (e.Nome_Escola || e.Nome_Escola_Padrao || '').toLowerCase();
      var inep = String(e.Cod_INEP).toLowerCase();
      var matchBusca = inep.includes(termo) || nome.includes(termo);
      var matchMun = mun === "" || e.Municipio === mun;
      var matchSet = set === "" || String(e.Setor_Regiao) === String(set);
      return matchBusca && matchMun && matchSet;
    });
    renderizarTabelaEscolas(filtradas);
  }

  function salvarDadosEscola() {
    // Detecta qual padrão de cabeçalho usar baseado na lista carregada
    var headersOriginais = listaEscolasCompleta.length > 0 ? Object.keys(listaEscolasCompleta[0]) : [];
    var dados = { Cod_INEP: document.getElementById('esc-inep').value };

    // Função auxiliar para setar o campo no header correto se existir
    function setCampo(pref, inputId) {
      var val = document.getElementById(inputId).value;
      var matches = headersOriginais.filter(h => h.indexOf(pref) > -1);
      if (matches.length > 0) {
        matches.forEach(m => dados[m] = val);
      } else {
        dados[pref] = val; // Fallback se não encontrar similar
      }
    }

    // Mapeamento específico para garantir que salve nos nomes corretos do CSV
    if (headersOriginais.indexOf('Nome_Escola_Padrao') > -1) dados.Nome_Escola_Padrao = document.getElementById('esc-nome').value;
    else dados.Nome_Escola = document.getElementById('esc-nome').value;
    dados.Municipio = document.getElementById('esc-municipio').value;
    dados.Setor_Regiao = document.getElementById('esc-setor').value;
    if (headersOriginais.indexOf('Email_Institucional') > -1) dados.Email_Institucional = document.getElementById('esc-email').value;
    else dados.Email_Diretor = document.getElementById('esc-email').value;
    if (headersOriginais.indexOf('Celular_Diretor') > -1) dados.Celular_Diretor = document.getElementById('esc-fone').value;
    if (headersOriginais.indexOf('Whatsapp_Diretor') > -1) dados.Whatsapp_Diretor = document.getElementById('esc-fone').value;
    if (headersOriginais.indexOf('Celular_Diretor') === -1 && headersOriginais.indexOf('Whatsapp_Diretor') === -1) dados.Celular_Diretor = document.getElementById('esc-fone').value;
    if (headersOriginais.indexOf('Endereco_Completo') > -1) dados.Endereco_Completo = document.getElementById('esc-endereco').value;
    else dados.Endereco = document.getElementById('esc-endereco').value;
    if (headersOriginais.indexOf('Geo_Latitude') > -1) dados.Geo_Latitude = document.getElementById('esc-lat').value;
    else dados.Latitude = document.getElementById('esc-lat').value;
    if (headersOriginais.indexOf('Geo_Longitude') > -1) dados.Geo_Longitude = document.getElementById('esc-long').value;
    else dados.Longitude = document.getElementById('esc-long').value;
    Swal.fire({ title: 'Salvando...', allowOutsideClick: false, didOpen: function() { Swal.showLoading() } });
    google.script.run
      .withSuccessHandler(function(resp) {
        if (resp.success) { Swal.fire('Sucesso!', resp.message, 'success'); $('#escolaFormModal').modal('hide'); abrirGestaoEscolas(); }
        else showMsg("Erro", resp.message, "error");
      })
      .salvarEscola(dados);
  }

      if (result.isConfirmed) {

            if (resp.success) { Swal.fire('Removida!', 'A escola foi excluída.', 'success'); abrirGestaoEscolas(); }
            else showMsg("Erro", resp.message, "error");
          })
          .excluirEscola(inep);
      }
    });
  }

    var totalGeral = 0;
    var totalTO = 0;
    var sIds = Object.keys(dados).sort();
    var paleta = { "1": "#3b82f6", "2": "#10b981", "3": "#f59e0b", "4": "#ef4444", "5": "#8b5cf6", "S/S": "#64748b" };
    for (var i = 0; i < sIds.length; i++) {
      var sId = sIds[i];
      var setor = dados[sId];
      var totalSetor = 0;
      var munHtml = "";

      // Função de normalização robusta para contar Teófilo Otoni corretamente
      function normalizar(t) { return String(t || "").toUpperCase().replace(/[ÁÀÂÃ]/g, "A").replace(/[ÉÈÊ]/g, "E").replace(/[ÍÌÎ]/g, "I").replace(/[ÓÒÔÕ]/g, "O").replace(/[ÚÙÛ]/g, "U").replace(/[Ç]/g, "C").trim(); }
      // Ordenar Municípios
      var munKeys = Object.keys(setor.municipios).sort(function(a, b) {
        var aSimp = normalizar(a);
        var bSimp = normalizar(b);
        var sede = "TEOFILO OTONI";
        if (aSimp === sede && bSimp !== sede) return -1;
        if (aSimp !== sede && bSimp === sede) return 1;
        return a.localeCompare(b);
      });
      for (var j = 0; j < munKeys.length; j++) {
        var mun = munKeys[j];
        var escolas = setor.municipios[mun];
        var count = escolas.length;
        totalSetor += count;
        totalGeral += count;
        if (normalizar(mun) === "TEOFILO OTONI") totalTO += count;
        var btnRemMun = (normalizar(mun) !== "TEOFILO OTONI" && appUserInfo.isAdmin) ? '<i class="material-icons btn-remanezar ml-2" style="font-size:16px" title="Mover Município" onclick="solicitarMoverMunicipio(\''+mun.replace(/'/g, "\\'")+'\', \''+sId+'\', event)">swap_horiz</i>' : '';
        munHtml += '<div class="municipio-pill w-100 mb-2" onclick="toggleMunEscolas(this, event)">' +
          '<div class="d-flex justify-content-between align-items-center"><span><strong>' + mun + '</strong> ' + btnRemMun + '</span><span class="badge badge-light">' + count + '</span></div>' +
          '<div class="escolas-lista d-none mt-2 text-left">' +
            escolas.map(function(e) { 
              // Proteção contra aspas simples em nomes de escolas (ex: EE D'Abadia)
              var nomeEscolaEscaped = e.nome.replace(/'/g, "\\'");
              var munEscaped = mun.replace(/'/g, "\\'");
              var btnRemEsc = (normalizar(mun) === "TEOFILO OTONI" && appUserInfo.isAdmin) ? '<i class="material-icons btn-remanezar float-right" style="font-size:14px" onclick="solicitarMoverEscola(\''+e.inep+'\', \''+nomeEscolaEscaped+'\', \''+sId+'\', event)">swap_horiz</i>' : '';
              var nomeEscolaLink = '<a href="#" class="font-weight-bold text-primary" onclick="abrirNovoChamadoTecnico(\''+e.inep+'\', \''+nomeEscolaEscaped+'\', \''+munEscaped+'\', \''+sId+'\', event)">' + e.nome + '</a>';
              return '<div class="small py-1 border-top">• ' + nomeEscolaLink + ' <span class="text-muted">('+e.inep+')</span>' + btnRemEsc + '</div>';
            }).join('') +
          '</div></div>';
      }
      labelsSetores.push("Setor " + sId + " - " + setor.tecnico);
      countsEscolas.push(totalSetor);
      coresSetores.push(paleta[sId] || "#64748b");
      var cardHtml = '<div class="col-xl col-lg-4 col-md-6 mb-4"><div class="sector-row sector-' + sId + '"><div class="sector-header d-flex flex-column align-items-start p-3" onclick="toggleSectorRow(this)"><div class="sector-info w-100 mb-2"><div class="sector-badge mb-2">' + sId + '</div><div><h5 class="mb-0 font-weight-bold text-dark">SETOR ' + sId + '</h5><div class="text-primary font-weight-bold" style="font-size:12px">' + setor.tecnico + '</div></div></div><div class="w-100 d-flex justify-content-between align-items-center"><span class="h5 font-weight-bold mb-0">' + totalSetor + ' <small class="text-muted">Escolas</small></span><i class="material-icons align-middle text-muted">expand_more</i></div></div><div class="escolas-container-modern d-none"><div class="p-2">' + munHtml + '</div></div></div></div>';
      container.insertAdjacentHTML('beforeend', cardHtml);
    }
    document.getElementById('total-escolas-dash').textContent = totalGeral;
    document.getElementById('count-to').textContent = totalTO;

    // Gráfico com Cores Distintas
    setTimeout(function() {
      var canvas = document.getElementById('chartSetores');
      if (!canvas) return;
      canvas.parentNode.style.height = (sIds.length * 60 + 80) + 'px';
      var ctx = canvas.getContext('2d');
      if (chartSetoresInstancia) chartSetoresInstancia.destroy();
      chartSetoresInstancia = new Chart(ctx, {
        type: 'bar',
        data: { labels: labelsSetores, datasets: [{ label: 'Escolas', data: countsEscolas, backgroundColor: coresSetores, borderRadius: 10 }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { bodyFont: { size: 16 } } }, scales: { y: { ticks: { font: { weight: 'bold', size: 16 }, color: '#333' }, grid: { display: false } }, x: { beginAtZero: true, grid: { color: '#f0f0f0' } } } }
      });
        }, 500);
      }
    
      function solicitarMoverEscola(inep, nome, setorAtual, event) {
        event.stopPropagation();
    Swal.fire({ title: 'Remanejar Escola', html: 'Mover <b>' + nome + '</b> para qual setor?', input: 'select', inputOptions: { '1': 'Setor 1', '2': 'Setor 2', '3': 'Setor 3', '4': 'Setor 4', '5': 'Setor 5' }, inputValue: setorAtual, showCancelButton: true, confirmButtonText: 'REMANEJAR', cancelButtonText: 'CANCELAR' }).then(function(res) {
          if (res.isConfirmed && res.value !== setorAtual) {
        Swal.fire({ title: 'Remanejando...', allowOutsideClick: false, didOpen: function() { Swal.showLoading() } });
        google.script.run.withSuccessHandler(function() { Swal.fire('Sucesso!', 'Escola remanejada.', 'success'); abrirGestaoSetores(); }).remanezarEscola(inep, res.value);
          }
        });
      }
    
      function solicitarMoverMunicipio(municipio, setorAtual, event) {
        event.stopPropagation();
    Swal.fire({ title: 'Remanejar Município', html: 'Mover TODAS as escolas de <b>' + municipio + '</b> para qual setor?', input: 'select', inputOptions: { '1': 'Setor 1', '2': 'Setor 2', '3': 'Setor 3', '4': 'Setor 4', '5': 'Setor 5' }, inputValue: setorAtual, showCancelButton: true, confirmButtonText: 'MOVER TUDO', cancelButtonText: 'CANCELAR' }).then(function(res) {
          if (res.isConfirmed && res.value !== setorAtual) {
        Swal.fire({ title: 'Remanejando...', allowOutsideClick: false, didOpen: function() { Swal.showLoading() } });
        google.script.run.withSuccessHandler(function() { Swal.fire('Sucesso!', 'Município remanejado.', 'success'); abrirGestaoSetores(); }).remanezarMunicipio(municipio, res.value);
          }
        });
      }
    
      function toggleSectorRow(el, event) {
        if (event) event.stopPropagation();
    var container = el.closest('.sector-row');
    if (!container) return;
    var content = container.querySelector('.escolas-container-modern');
    var icon = el.querySelector('.material-icons');
    if (content.classList.contains('d-none')) {
      content.classList.remove('d-none');
      icon.textContent = "expand_less";
      container.style.borderColor = "#3b82f6";
    } else {
      content.classList.add('d-none');
      icon.textContent = "expand_more";
      container.style.borderColor = "#eef2f7";
    }
  }

    function toggleMunEscolas(el, event) {
      event.stopPropagation();
      var lista = el.querySelector('.escolas-lista');
      if (lista.classList.contains('d-none')) {
        lista.classList.remove('d-none');
        el.style.backgroundColor = "#fff";
        el.style.borderColor = "#3b82f6";
      } else {
        lista.classList.add('d-none');
        el.style.backgroundColor = "#f8fafc";
        el.style.borderColor = "#e2e8f0";
          }
        }
          // Funções para Abertura de Chamado via Técnico
                                                            function abrirNovoChamadoTecnico(inep, nome, municipio, setor, event) {
    if (event) { event.preventDefault(); event.stopPropagation(); }
                                                              document.getElementById('form-chamado-tecnico').reset();
                                                              document.getElementById('tec-esc-inep').value = inep;
                                                              document.getElementById('tec-esc-nome').value = nome;
                                                              document.getElementById('tec-esc-municipio').value = municipio;
                                                              document.getElementById('tec-esc-setor').value = setor;
                                                              document.getElementById('tec-esc-label').textContent = inep + " - " + nome;
                                                              var btnSalvar = document.getElementById('btn-gerar-chamado-tec');
                                                              if (btnSalvar) btnSalvar.disabled = false;
                                                              var chks = document.querySelectorAll('.chk-tipo');
                                                              for(var i=0; i<chks.length; i++) chks[i].checked = false;
                                                              toggleCamposSolicitante();
    toggleTipoOutro(); 
                                                              $('#chamadoTecnicoModal').modal('show');
                                                            }

                                                            function toggleCamposSolicitante() {
                                                              var origemEl = document.querySelector('input[name="tec-origem"]:checked');
                                                              var origem = origemEl ? origemEl.value : "";
                                                              var container = document.getElementById('container-solicitante');
                                                              if (origem.indexOf('Preventivo') > -1) {
                                                                container.classList.add('d-none');
                                                                document.getElementById('tec-solicitante').required = false;
                                                              } else {
                                                                container.classList.remove('d-none');
                                                              }
                                                            }

                                                            function toggleTipoOutro() {
                                                              var chkOutro = document.getElementById('chk-tipo-outro-check');
                                                              var inputOutro = document.getElementById('tec-tipo-outro');
                                                              if (chkOutro.checked) {
                                                                inputOutro.classList.remove('d-none');
                                                                inputOutro.required = true;
                                                                inputOutro.focus();
                                                              } else {
                                                                inputOutro.classList.add('d-none');
                                                                inputOutro.required = false;
                                                                inputOutro.value = '';
                                                              }
                                                            }

                              function salvarChamadoTecnico() {
            var inep = document.getElementById('tec-esc-inep').value;
    if (!inep) { showMsg("Atenção", "Por favor, selecione uma escola primeiro.", "warning"); return; }
            var btnSalvar = document.getElementById('btn-gerar-chamado-tec');
    if (btnSalvar && btnSalvar.disabled) return;
            if (btnSalvar) btnSalvar.disabled = true;
            var origemEl = document.querySelector('input[name="tec-origem"]:checked');
            var origem = origemEl ? origemEl.value : "";
            var chks = document.querySelectorAll('.chk-tipo:checked');
            var tiposSelecionados = [];
            var temOutro = false;
            for (var i = 0; i < chks.length; i++) {
      if (chks[i].value === 'Outro') temOutro = true;
      else tiposSelecionados.push(chks[i].value);
              }
            if (temOutro) {
              var textoOutro = document.getElementById('tec-tipo-outro').value;
      if (!textoOutro) { if (btnSalvar) btnSalvar.disabled = false; showMsg("Atenção", "Especifique o tipo 'Outro'.", "warning"); return; }
              tiposSelecionados.push("Outro: " + textoOutro);
            }
    if (tiposSelecionados.length === 0) { if (btnSalvar) btnSalvar.disabled = false; showMsg("Atenção", "Selecione pelo menos um Tipo de Solicitação.", "warning"); return; }

            var tipoSolicitacaoFinal = tiposSelecionados.join(" | ");
            var dados = {
      inep: inep, escola: document.getElementById('tec-esc-nome').value, municipio: document.getElementById('tec-esc-municipio').value, setor: document.getElementById('tec-esc-setor').value, origem: origem, tipoSolicitacao: tiposSelecionados.join(" | "), solicitante: document.getElementById('tec-solicitante').value, masp: document.getElementById('tec-masp').value, cargo: document.getElementById('tec-cargo').value, celular: document.getElementById('tec-celular').value, descricao: document.getElementById('tec-descricao').value
            };
            Swal.fire({ title: 'Gerando chamado...', allowOutsideClick: false, didOpen: function() { Swal.showLoading() } });
            google.script.run
              .withSuccessHandler(function(resp) {
        if (resp && resp.success) { Swal.fire({ icon: 'success', title: 'Chamado Gerado!', text: 'Protocolo: #' + resp.protocolo, confirmButtonText: 'OK' }).then(function() { $('#chamadoTecnicoModal').modal('hide'); refreshDados(); }); }
        else { if (btnSalvar) btnSalvar.disabled = false; showMsg("Erro no Servidor", (resp ? resp.message : "Resposta inválida"), "error"); }
              })
      .withFailureHandler(function(err) { if (btnSalvar) btnSalvar.disabled = false; showError(err); })
              .salvarChamadoManualTecnico(dados);
          }

          // ==========================================
          // GESTÃO DE CONFIGURAÇÕES (TÉCNICOS E FERIADOS)
          // ==========================================
  function abrirConfiguracoes() { carregarTecnicos(); carregarFeriados(); $('#configModal').modal('show'); }

          // --- TÉCNICOS ---
          var listaTecnicos = [];
  function carregarTecnicos() { google.script.run.withSuccessHandler(function(data) { listaTecnicos = data; renderTecnicos(); }).getTecnicos(); }
          function renderTecnicos() {
            var tbody = document.getElementById('tbody-tecnicos');
            tbody.innerHTML = '';
            listaTecnicos.forEach(function(t) {
      var adminBadge = (String(t.admin).toUpperCase() === 'TRUE') ? '<span class="badge badge-success">SIM</span>' : '<span class="badge badge-light text-muted">NÃO</span>';
      var html = '<tr><td class="pl-3 font-weight-bold align-middle">' + t.nome + '</td><td class="align-middle text-muted small">' + (t.masp || '-') + '</td><td class="align-middle text-muted small">' + t.email + '</td><td class="text-center align-middle font-weight-bold">' + t.setor + '</td><td class="text-center align-middle">' + adminBadge + '</td><td class="text-right pr-3"><button class="btn btn-sm btn-link text-primary p-0 mr-2" onclick="editarTecnico(\'' + t.email + '\')"><i class="material-icons" style="font-size:16px">edit</i></button><button class="btn btn-sm btn-link text-danger p-0" onclick="excluirTecnico(\'' + t.email + '\')"><i class="material-icons" style="font-size:16px">delete</i></button></td></tr>';
              tbody.insertAdjacentHTML('beforeend', html);
            });
          }

  function novoTecnico() { document.getElementById('form-tecnico').reset(); document.getElementById('cfg-tec-email').readOnly = false; document.getElementById('cfg-tec-masp').value = ""; $('#formTecnicoModal').modal('show'); }
          function editarTecnico(email) {
            var t = listaTecnicos.find(function(x) { return x.email === email; });
            if (!t) return;
            document.getElementById('cfg-tec-email').value = t.email;
    document.getElementById('cfg-tec-email').readOnly = true; 
            document.getElementById('cfg-tec-nome').value = t.nome;
            document.getElementById('cfg-tec-masp').value = t.masp || "";
            document.getElementById('cfg-tec-setor').value = t.setor;
            document.getElementById('cfg-tec-admin').value = (String(t.admin).toUpperCase() === 'TRUE') ? "TRUE" : "FALSE";
            $('#formTecnicoModal').modal('show');
          }

          function salvarTecnico() {
    var dados = { email: document.getElementById('cfg-tec-email').value, nome: document.getElementById('cfg-tec-nome').value, masp: document.getElementById('cfg-tec-masp').value, setor: document.getElementById('cfg-tec-setor').value, admin: document.getElementById('cfg-tec-admin').value };
            Swal.fire({ title: 'Salvando...', didOpen: () => Swal.showLoading() });
    google.script.run.withSuccessHandler(function(res) { if (res.success) { Swal.close(); $('#formTecnicoModal').modal('hide'); carregarTecnicos(); } else { showMsg("Erro", res.message, "error"); } }).salvarTecnico(dados);
          }

  function excluirTecnico(email) { if (!confirm("Excluir " + email + "?")) return; google.script.run.withSuccessHandler(function(res) { if(res.success) carregarTecnicos(); else showMsg("Erro", res.message, "error"); }).excluirTecnico(email); }

          // --- FERIADOS ---
          var listaFeriados = [];
  function carregarFeriados() { google.script.run.withSuccessHandler(function(data) { listaFeriados = data; renderFeriados(); }).getFeriados(); }
          function renderFeriados() {
            var tbody = document.getElementById('tbody-feriados');
            tbody.innerHTML = '';
            listaFeriados.forEach(function(f) {
      var html = '<tr><td class="pl-3 font-weight-bold align-middle">' + f.dataFmt + '</td><td class="align-middle text-muted">' + f.descricao + '</td><td class="text-right pr-3"><button class="btn btn-sm btn-link text-danger p-0" onclick="excluirFeriado(\'' + f.data + '\')"><i class="material-icons" style="font-size:16px">delete</i></button></td></tr>';
              tbody.insertAdjacentHTML('beforeend', html);
            });
          }

  function novoFeriado() { document.getElementById('form-feriado').reset(); $('#formFeriadoModal').modal('show'); }
          function salvarFeriado() {
    var dados = { data: document.getElementById('cfg-fer-data').value, descricao: document.getElementById('cfg-fer-desc').value };
            if(!dados.data) return alert("Data obrigatória");
            Swal.fire({ title: 'Salvando...', didOpen: () => Swal.showLoading() });
    google.script.run.withSuccessHandler(function(res) { if (res.success) { Swal.close(); $('#formFeriadoModal').modal('hide'); carregarFeriados(); } else { showMsg("Erro", res.message, "error"); } }).salvarFeriado(dados);
          }

  function excluirFeriado(data) { if (!confirm("Excluir feriado?")) return; google.script.run.withSuccessHandler(function(res) { if(res.success) carregarFeriados(); }).excluirFeriado(data); }
</script>
